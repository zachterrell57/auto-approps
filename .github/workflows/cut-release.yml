name: Cut Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Bump type (patch, minor, major) or exact semver (e.g. 0.0.6)"
        required: true
        default: patch

concurrency:
  group: cut-release
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Run checks (lint + build + typecheck)
        run: npm run check

  bump-and-tag:
    needs: check
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve version
        id: version
        run: |
          INPUT="${{ github.event.inputs.version }}"

          if [[ "$INPUT" =~ ^(patch|minor|major)$ ]]; then
            CURRENT=$(node -p "require('./package.json').version")
            RESOLVED=$(npx --yes semver "$CURRENT" -i "$INPUT")
          else
            # Validate it's a valid semver string
            RESOLVED=$(npx --yes semver "$INPUT")
            if [ -z "$RESOLVED" ]; then
              echo "::error::Invalid semver: $INPUT"
              exit 1
            fi
          fi

          echo "version=$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "tag=v$RESOLVED" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $RESOLVED (tag: v$RESOLVED)"

      - name: Verify tag does not exist
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "::error::Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Bump version in package.json
        run: npm version ${{ steps.version.outputs.version }} --no-git-tag-version

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump version to ${{ steps.version.outputs.version }}"
          git tag "${{ steps.version.outputs.tag }}"

      - name: Push commit and tag
        run: |
          git push origin HEAD:main
          git push origin "${{ steps.version.outputs.tag }}"

  build:
    needs: bump-and-tag
    strategy:
      matrix:
        include:
          - arch: arm64
          - arch: x64
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.bump-and-tag.outputs.tag }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Import signing certificate
        env:
          CERTIFICATE_P12_BASE64: ${{ secrets.CERTIFICATE_P12_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/certificate.p12
          KEYCHAIN_PATH=$RUNNER_TEMP/signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          echo -n "$CERTIFICATE_P12_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" login.keychain-db

      - name: Install dependencies
        run: npm ci && npm ci --prefix frontend

      - name: Build, sign & notarize
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          export APPLE_ID=$(echo "$APPLE_ID" | tr -d '[:space:]')
          export APPLE_ID_PASSWORD=$(echo "$APPLE_ID_PASSWORD" | tr -d '[:space:]')
          export APPLE_TEAM_ID=$(echo "$APPLE_TEAM_ID" | tr -d '[:space:]')
          npm run make -- --arch=${{ matrix.arch }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.arch }}
          path: |
            out/make/**/*.dmg
            out/make/**/*.zip

  release:
    needs: [bump-and-tag, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-and-tag.outputs.tag }}
          draft: false
          generate_release_notes: true
          files: artifacts/**/*
